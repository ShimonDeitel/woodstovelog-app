name: WoodstoveLog
options:
  bundleIdPrefix: com.shimondeitel.woodstovelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  WoodstoveLog:
    type: application
    platform: iOS
    sources:
      - path: WoodstoveLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.woodstovelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: WoodstoveLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WoodstoveLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WoodstoveLogTests
      - path: WoodstoveLog.storekit
    dependencies:
      - target: WoodstoveLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.woodstovelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  WoodstoveLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WoodstoveLogUITests
    dependencies:
      - target: WoodstoveLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.woodstovelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  WoodstoveLog:
    build:
      targets:
        WoodstoveLog: all
        WoodstoveLogTests: [test]
        WoodstoveLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: WoodstoveLog.storekit
    test:
      config: Debug
      storeKitConfiguration: WoodstoveLog.storekit
      targets:
        - WoodstoveLogTests
        - WoodstoveLogUITests
    archive:
      config: Release
