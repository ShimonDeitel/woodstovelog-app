<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Woodstove Log</title>
<style>
body { background:#19110c; color:#f2ede6; font-family:-apple-system,Helvetica,Arial,sans-serif; margin:0; }
.wrap { max-width:640px; margin:0 auto; padding:90px 24px; text-align:center; }
h1 { font-size:2.4rem; color:#f28c26; margin-bottom:8px; }
p.tagline { font-size:1.15rem; opacity:0.85; margin-bottom:36px; }
.feature { background:rgba(255,255,255,0.05); border-radius:14px; padding:20px; margin:14px 0; text-align:left; }
.feature h3 { margin:0 0 6px 0; color:#f28c26; }
footer { margin-top:60px; font-size:0.85rem; opacity:0.6; }
a { color:#f28c26; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #f28c2655 0%, #f28c2600 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style></head>
<body>
<div class="orb"></div>
<div class="wrap">
<h1>Woodstove Log</h1>
<p class="tagline">Track wood stove and fireplace chimney sweeps and firewood inventory.</p>
<div class="feature"><h3>Free</h3><p>Log sweep dates and firewood cords on hand</p></div>
<div class="feature"><h3>Pro</h3><p>Seasonal burn-log with creosote buildup reminders</p></div>
<footer>

</footer>
</div>
</body></html>
